plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
    // Used to generate class files given .xsd schema
    id 'org.unbroken-dome.xjc' version '1.4.3'
}

repositories {
    jcenter()
    mavenCentral()
}

dependencies {
    // Use JUnit test framework.
    testImplementation 'junit:junit:4.13'

    implementation group: 'org.apache.activemq', name: 'activemq-core', version: '5.7.0'
    implementation group: 'org.apache.activemq', name: 'artemis-jms-client', version: '2.11.0'

    implementation group: 'org.apache.ws.commons.schema', name: 'XmlSchema', version: '1.4.7'

    implementation 'javax.xml.bind:jaxb-api:2.3.1'
    //implementation group: 'javax.jms', name: 'jms', version: '1.1'
    implementation 'javax.jms:javax.jms-api:2.0.1'
    implementation 'org.glassfish.jaxb:jaxb-runtime:2.3.2'

}

sourceCompatibility = 8
targetCompatibility = 8

application {
    // Define the main class for the application.
    mainClass = 'syndeo_jms_comms.App'
}

jar {
  manifest { 
    attributes "Main-Class": "syndeo_jms_comms.App"
  }  

  from {
    configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
  }
}
